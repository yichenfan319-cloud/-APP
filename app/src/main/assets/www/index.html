<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>武夷学院课表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #f0f2f5;
            padding: 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; margin-bottom: 20px; text-align: center; color: #1a2c3e; }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.2s;
            background: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #034ea1;
            background: white;
            box-shadow: 0 0 0 3px rgba(3,78,161,0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #034ea1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:active { opacity: 0.85; }
        .btn-secondary {
            background: #6c757d;
            margin-top: 12px;
        }
        .tip {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        .tip.ok { background: #e8f5e9; color: #2e7d32; }
        .tip.err { background: #ffebee; color: #c62828; }
        .hidden { display: none; }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .btn-group button {
            flex: 1;
            min-width: 70px;
            margin-top: 0;
            padding: 10px;
            font-size: 14px;
        }
        .course-list {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            max-height: 500px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn .loading { display: none; }
        button:disabled { opacity: 0.6; }
        .checkbox-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            margin-bottom: 8px;
        }
        .checkbox-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-bottom: 0;
        }
        .checkbox-row input {
            width: 18px;
            height: 18px;
            margin: 0;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 12px;
            padding: 4px 8px;
            margin: 0;
            width: auto;
            cursor: pointer;
        }
        .clear-btn:active { opacity: 0.7; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="login-page">
        <h1>📖 武夷学院课表</h1>
        <div class="input-group">
            <label>学号</label>
            <input type="text" id="username" placeholder="请输入学号" autocomplete="off">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="checkbox-row">
            <label>
                <input type="checkbox" id="rememberCheckbox" checked>
                <span style="font-size: 14px; color: #666;">记住密码</span>
            </label>
            <button id="clearCredentialsBtn" class="clear-btn" style="display: none;">清除记录</button>
        </div>
        <button id="loginBtn" class="btn">
            <span class="txt">登录教务系统</span>
            <span class="loading hidden"></span>
        </button>
        <div id="tip" class="tip hidden"></div>
    </div>

    <div class="card hidden" id="timetable-page">
        <h1>我的课表</h1>
        <div class="btn-group">
            <button id="todayBtn">今天</button>
            <button id="tomorrowBtn">明天</button>
            <button id="weekBtn">本周</button>
            <button id="refreshBtn">更新</button>
        </div>
        <div id="courseContent" class="course-list">加载中...</div>
        <button id="logoutBtn" class="btn-secondary">切换账号</button>
    </div>
</div>

<script>
    // 页面元素
    const loginPage = document.getElementById('login-page');
    const timetablePage = document.getElementById('timetable-page');
    const tipDiv = document.getElementById('tip');
    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberCheckbox = document.getElementById('rememberCheckbox');
    const clearCredentialsBtn = document.getElementById('clearCredentialsBtn');
    const todayBtn = document.getElementById('todayBtn');
    const tomorrowBtn = document.getElementById('tomorrowBtn');
    const weekBtn = document.getElementById('weekBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const courseContent = document.getElementById('courseContent');

    let coursesData = [];

    // 辅助函数
    function showTip(msg, isErr = false) {
        tipDiv.textContent = msg;
        tipDiv.className = 'tip ' + (isErr ? 'err' : 'ok');
        tipDiv.classList.remove('hidden');
        setTimeout(() => {
            if (tipDiv) tipDiv.classList.add('hidden');
        }, 4000);
    }

    function setLoginBtnLoading(loading) {
        const txt = loginBtn.querySelector('.txt');
        const spin = loginBtn.querySelector('.loading');
        if (loading) {
            txt.textContent = '登录中...';
            spin.classList.remove('hidden');
            loginBtn.disabled = true;
        } else {
            txt.textContent = '登录教务系统';
            spin.classList.add('hidden');
            loginBtn.disabled = false;
        }
    }

    // 格式化课表显示
    function formatCoursesByDay(day) {
        console.log('formatCoursesByDay 被调用, day:', day);
        console.log('coursesData:', window.coursesData);

        if (!window.coursesData || window.coursesData.length === 0) {
            return '暂无课表数据';
        }

        const dayCourses = window.coursesData.filter(c => c.dayOfWeek === day);
        console.log('筛选出的课程:', dayCourses);

        if (dayCourses.length === 0) return '今天没有课，好好休息吧~';

        let result = '';
        const order = ['第一二节', '第三四节', '第五六节', '第七八节', '第九十节'];
        dayCourses.sort((a, b) => order.indexOf(a.timeSlot) - order.indexOf(b.timeSlot));

        for (let c of dayCourses) {
            result += `📚 ${c.name}\n`;
            result += `📍 地点：${c.location}\n`;
            result += `👨‍🏫 教师：${c.teacher}\n`;
            result += `⏰ 节次：${c.sections}\n`;
            result += `📅 周次：${c.weekRange || '全周'}\n`;
            result += `\n`;
        }
        return result;
    }

    function formatWeekCourses() {
        if (!coursesData || coursesData.length === 0) return '暂无课表数据';
        const weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        let result = '';
        for (let day of weekdays) {
            const dayCourses = coursesData.filter(c => c.dayOfWeek === day);
            if (dayCourses.length > 0) {
                result += `【${day}】\n`;
                for (let c of dayCourses) {
                    result += `  ${c.name} @ ${c.location}\n`;
                }
                result += '\n';
            }
        }
        return result || '本周暂无课程';
    }

    function getTodayWeekday() {
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const today = new Date();
        const weekday = weekdays[today.getDay()];
        console.log('计算得到的今天:', weekday);
        return weekday;
    }

    function getTomorrowWeekday() {
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        return weekdays[tomorrow.getDay()];
    }

    // 接收来自 Android 的消息
    window.receiveFromAndroid = function(type, data) {
        console.log('收到 Android:', type);

        if (type === 'courses') {
            try {
                // 🔥 确保这里正确赋值
                window.coursesData = JSON.parse(data);
                console.log('✅ 课表数据已存储，共 ' + window.coursesData.length + ' 门课程');

                // 切换到课表界面
                loginPage.classList.add('hidden');
                timetablePage.classList.remove('hidden');
                setLoginBtnLoading(false);
                showTip('登录成功，课表已加载', false);

                // 🔥 显示今天课表
                window.requestToday();

            } catch(e) {
                console.error('解析课表失败:', e);
            }
        } else if (type === 'today') {
            courseContent.textContent = data || '今天没有课~';
        } else if (type === 'tomorrow') {
            courseContent.textContent = data || '明天没有课~';
        } else if (type === 'week') {
            courseContent.textContent = data || '本周暂无课表';
        } else if (type === 'error') {
            courseContent.textContent = '错误: ' + data;
            showTip(data, true);
            setLoginBtnLoading(false);
        } else if (type === 'saved_credentials') {
            // 🔥 接收保存的账号密码，自动填充到输入框
            if (data && data !== 'null') {
                try {
                    const cred = JSON.parse(data);
                    if (cred.username && cred.username !== 'null') {
                        usernameInput.value = cred.username;
                        if (cred.password && cred.password !== 'null') {
                            passwordInput.value = cred.password;
                        }
                        rememberCheckbox.checked = true;
                        clearCredentialsBtn.style.display = 'inline-block';
                        console.log('已自动填充保存的账号');
                    }
                } catch(e) {
                    console.log('解析保存的账号失败:', e);
                }
            } else {
                clearCredentialsBtn.style.display = 'none';
            }
        }
    };

    // 请求课表
    window.requestToday = function() {
        console.log('requestToday 被调用');
        console.log('coursesData:', window.coursesData);

        if (!window.coursesData || window.coursesData.length === 0) {
            console.log('coursesData 为空');
            courseContent.textContent = '暂无课表，请先登录';
            return;
        }

        const today = getTodayWeekday();
        console.log('今天是:', today);

        const result = formatCoursesByDay(today);
        courseContent.textContent = result || '今天没有课~';
    };

    window.requestTomorrow = function() {
        if (!window.coursesData || window.coursesData.length === 0) {
            courseContent.textContent = '暂无课表，请先登录';
            return;
        }

        const tomorrow = getTomorrowWeekday();
        console.log('明天是:', tomorrow);

        const result = formatCoursesByDay(tomorrow);
        courseContent.textContent = result || '明天没有课~';
    };

    window.requestWeek = function() {
        if (coursesData.length === 0) {
            courseContent.textContent = '暂无课表，请先登录';
            return;
        }
        const result = formatWeekCourses();
        courseContent.textContent = result || '本周暂无课表';
    };

    // 🔥 请求获取保存的账号密码（页面加载时调用）
    window.requestSavedCredentials = function() {
        if (Android && Android.getSavedCredentials) {
            Android.getSavedCredentials();
        }
    };

    // 登录
    loginBtn.onclick = function() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (!username || !password) {
            showTip('请填写完整的学号和密码', true);
            return;
        }
        setLoginBtnLoading(true);
        tipDiv.classList.add('hidden');
        Android.login(username, password);
    };

    // 🔥 清除记录按钮
    clearCredentialsBtn.onclick = function() {
        if (Android && Android.clearSavedCredentials) {
            Android.clearSavedCredentials();
            usernameInput.value = '';
            passwordInput.value = '';
            rememberCheckbox.checked = true;
            clearCredentialsBtn.style.display = 'none';
            showTip('已清除保存的账号密码', false);
        }
    };

    // 按钮事件
    todayBtn.onclick = window.requestToday;
    tomorrowBtn.onclick = window.requestTomorrow;
    weekBtn.onclick = function() {
        console.log('本周按钮被点击');
        if (window.coursesData && window.coursesData.length > 0) {
            console.log('有课表数据，准备跳转');
            Android.openWeekView(JSON.stringify(window.coursesData));
        } else {
            console.log('没有课表数据');
            showTip('请先登录获取课表', true);
        }
    };
    refreshBtn.onclick = function() {
        courseContent.textContent = '正在更新课表...';
        Android.refresh();
    };
    logoutBtn.onclick = function() {
        Android.relogin();
        loginPage.classList.remove('hidden');
        timetablePage.classList.add('hidden');
        coursesData = [];
        setLoginBtnLoading(false);
        tipDiv.classList.add('hidden');
        courseContent.textContent = '';
        // 重新请求保存的账号密码（填充到输入框）
        setTimeout(() => {
            window.requestSavedCredentials();
        }, 500);
    };

    // 🔥 页面加载完成后，请求保存的账号密码
    window.addEventListener('DOMContentLoaded', function() {
        window.requestSavedCredentials();
    });
</script>
</body>
</html>
